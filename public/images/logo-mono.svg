<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 338 64" role="img" aria-label="OduDoc">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C98A"/>
      <stop offset="100%" stop-color="#0EA5A0"/>
    </linearGradient>
  </defs>

  <!-- Icon: gradient rounded square + white cross -->
  <rect x="0" y="0" width="64" height="64" rx="18" fill="url(#ig)"/>
  <rect x="25" y="12" width="14" height="40" rx="5" fill="white"/>
  <rect x="12" y="25" width="40" height="14" rx="5" fill="white"/>

  <!-- Wordmark uses currentColor so the parent's text color drives it.
       Light mode parent: text-[#0F3570] → dark navy. Dark mode parent:
       text-white. Single asset, no dual-image swap needed. -->
  <text
    x="70" y="46"
    font-family="'Nunito','Poppins','Comfortaa','Arial Rounded MT Bold',Arial,sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="-1"
    fill="currentColor">OduDoc</text>
</svg>
