# /etc/nginx/sites-available/files.odudoc.com
# After copying this file, certbot will inject the SSL block automatically.
# This is the version BEFORE certbot touches it — certbot reads the server_name
# and adds the 443 server block + redirect.

server {
    listen 80;
    server_name files.odudoc.com;

    # Max upload size — must be >= the largest file you'll accept.
    # 2 GB ceiling accommodates video recordings.
    client_max_body_size 2048M;

    # Pass everything to the Node.js upload service on 127.0.0.1:3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Big uploads may take a while — increase timeouts
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;  # stream uploads straight through
    }

    # Friendly health check without hitting Node
    location = /_nginx_health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
